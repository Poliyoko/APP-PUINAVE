name: SGODA Builder CI

on:
  push:
    branches:
      - master
      - "feature/**"
    paths:
      - "builder/**"
      - ".github/workflows/builder-ci.yml"
  pull_request:
    branches:
      - master
    paths:
      - "builder/**"
      - ".github/workflows/builder-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: builder-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.14"

    defaults:
      run:
        working-directory: builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: builder/pyproject.toml

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install Builder with development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile source
        run: python -m compileall -f ./src

      - name: Run test suite
        run: python -m pytest ./tests -v

  package:
    name: Build and validate distribution
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15

    defaults:
      run:
        working-directory: builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: builder/pyproject.toml

      - name: Install packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate distributions
        run: python -m twine check ./dist/*

      - name: Run installed-package smoke test
        run: python ./scripts/ci_smoke_test.py --wheel-glob "./dist/*.whl"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sgoda-builder-distributions
          path: |
            builder/dist/*.whl
            builder/dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14
