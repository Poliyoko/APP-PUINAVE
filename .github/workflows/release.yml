name: SGODA Builder Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de versión a validar, por ejemplo v1.0.0"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: builder-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: builder/pyproject.toml

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Validate tag and package version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          PACKAGE_VERSION="$(python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"
          if [[ "${VERSION}" != "${PACKAGE_VERSION}" ]]; then
            echo "Tag ${VERSION} y paquete ${PACKAGE_VERSION} no coinciden."
            exit 1
          fi

      - name: Run tests
        run: |
          python -m pip install -e ".[dev]"
          python -m pytest ./tests -v

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: |
          python -m twine check ./dist/*
          python ./scripts/validate_release.py --dist ./dist --expected-version "${PACKAGE_VERSION}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sgoda-builder-${{ github.ref_name }}
          path: |
            builder/dist/*.whl
            builder/dist/*.tar.gz
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SGODA Project Builder ${{ github.ref_name }}
          body_path: builder/docs/releases/1.0.0.md
          files: |
            builder/dist/*.whl
            builder/dist/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-release
    if: ${{ false }}
    environment:
      name: pypi

    steps:
      - name: Placeholder for trusted publishing
        run: |
          echo "Configure el entorno pypi y cambie la condición del job."
          echo "La publicación recomendada es mediante PyPI Trusted Publishing."
